<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI相談くん</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      width: 350px;
      height: 500px;
      display: flex;
      flex-direction: column;
      background: #e5e5e5;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg-user {
      align-self: flex-end;
      background: #9fe88d;
      padding: 8px 12px;
      border-radius: 12px;
      max-width: 70%;
      white-space: pre-wrap;
    }

    .msg-ai {
      align-self: flex-start;
      background: #ffffff;
      padding: 8px 12px;
      border-radius: 12px;
      max-width: 70%;
      white-space: pre-wrap;
    }

    #input-area {
      display: flex;
      padding: 10px;
      background: #fff;
      border-top: 1px solid #ccc;
    }

    #input {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    #send {
      margin-left: 8px;
      padding: 8px 12px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #send:hover {
      background: #45a049;
    }
  </style>
</head>
<body>

  <div id="chat"></div>

  <div id="input-area">
    <input id="input" type="text" placeholder="悩みを入力…" />
    <button id="send">送信</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
